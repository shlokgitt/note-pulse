<!DOCTYPE html>
<html>
<head>
    <title>NotePulse Admin Setup</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #16213e; border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #8892b0; margin-bottom: 30px; font-size: 14px; }
        .section { background: #0f3460; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .section h2 { font-size: 16px; margin-bottom: 16px; color: #64ffda; }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #ccd6f6; }
        input { width: 100%; padding: 12px; border: 2px solid #233554; background: #1a1a2e; color: #fff; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        input:focus { outline: none; border-color: #64ffda; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-reset { background: #e2b714; color: #1a1a2e; margin-bottom: 8px; }
        .btn-reset:hover { background: #ffd700; }
        .btn-create { background: #64ffda; color: #1a1a2e; }
        .btn-create:hover { background: #4cdbba; }
        #log { margin-top: 20px; padding: 16px; background: #0a0a1a; border-radius: 8px; font-family: monospace; font-size: 13px; max-height: 200px; overflow-y: auto; display: none; }
        .log-success { color: #64ffda; }
        .log-error { color: #ff6b6b; }
        .log-info { color: #e2b714; }
        .divider { text-align: center; color: #8892b0; margin: 20px 0; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔧 NotePulse Admin Setup</h1>
        <p class="subtitle">Reset your password or create a new admin account</p>

        <!-- Option 1: Reset Password -->
        <div class="section">
            <h2>🔑 Option 1: Reset Password</h2>
            <label>Admin Email Address</label>
            <input type="email" id="resetEmail" placeholder="Enter your admin email">
            <button class="btn-reset" onclick="resetPassword()">📧 Send Password Reset Email</button>
        </div>

        <div class="divider">— OR —</div>

        <!-- Option 2: Create New Admin -->
        <div class="section">
            <h2>🆕 Option 2: Create New Admin Account</h2>
            <label>New Admin Email</label>
            <input type="email" id="newEmail" placeholder="Enter new admin email">
            <label>New Password (min 6 characters)</label>
            <input type="password" id="newPassword" placeholder="Enter new password">
            <button class="btn-create" onclick="createAdmin()">✅ Create Admin Account</button>
        </div>

        <div id="log"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
        const logDiv = document.getElementById('log');

        function log(msg, type = 'info') {
            logDiv.style.display = 'block';
            const line = document.createElement('div');
            line.className = 'log-' + type;
            line.textContent = msg;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function resetPassword() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) { log('❌ Please enter an email address', 'error'); return; }

            log('📧 Sending password reset email to: ' + email + '...', 'info');

            firebase.auth().sendPasswordResetEmail(email)
                .then(() => {
                    log('✅ Password reset email sent! Check your inbox (and spam folder).', 'success');
                    log('After resetting your password, you can login on the NotePulse website.', 'success');
                })
                .catch(err => {
                    log('❌ Error: ' + err.message, 'error');
                });
        }

        function createAdmin() {
            const email = document.getElementById('newEmail').value.trim();
            const password = document.getElementById('newPassword').value;
            if (!email || !password) { log('❌ Please fill in both fields', 'error'); return; }
            if (password.length < 6) { log('❌ Password must be at least 6 characters', 'error'); return; }

            log('🔄 Creating admin account: ' + email + '...', 'info');

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    const uid = userCredential.user.uid;
                    log('✅ User created! UID: ' + uid, 'success');
                    log('🔄 Adding to admins database...', 'info');

                    return firebase.database().ref('admins/' + uid).set(true).then(() => {
                        log('✅ Admin rights granted in database!', 'success');
                        log('🎉 ALL DONE! You can now login with:', 'success');
                        log('   Email: ' + email, 'success');
                        log('   Password: (the one you just entered)', 'success');
                    });
                })
                .catch(err => {
                    if (err.code === 'auth/email-already-in-use') {
                        log('⚠️ Email already registered. Signing in to get UID...', 'info');
                        // Try to sign in and just add to admins
                        firebase.auth().signInWithEmailAndPassword(email, password)
                            .then(userCredential => {
                                const uid = userCredential.user.uid;
                                log('✅ Signed in! UID: ' + uid, 'success');
                                log('🔄 Adding to admins database...', 'info');
                                return firebase.database().ref('admins/' + uid).set(true).then(() => {
                                    log('✅ Admin rights granted in database!', 'success');
                                    log('🎉 ALL DONE! You can now login on NotePulse.', 'success');
                                });
                            })
                            .catch(err2 => {
                                log('❌ Could not sign in: ' + err2.message, 'error');
                                log('💡 Try Option 1 to reset your password first, then come back here.', 'info');
                            });
                    } else {
                        log('❌ Error: ' + err.message, 'error');
                    }
                });
        }
    </script>
</body>
</html>
